<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <link rel="stylesheet" href="./style.css">
          <link rel="shortcut icon" href="https://img.icons8.com/color/512/amazon-prime-video.png" type="img/x-icon">
     <script src="https://kit.fontawesome.com/d06515553d.js" crossorigin="anonymous"></script>
</head>
<body>
     <div class="coverImg"> 
         <div class="coverShades">
               <div class="container">
                     <div class="logoBar">
                        <div class="logoImg">
                            <a href="netflixbasic.html">
                                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/08/Netflix_2015_logo.svg/2560px-Netflix_2015_logo.svg.png" alt="Netflix-logo" >    
                                    </a>
                       </div>
                         <div class="logintoPage">
                             <h2>Sign In</h2>
                        <form>
                               <input type="email" placeholder="Email or phone number" required>
                               <input type="password" placeholder="password" required>
                               <button class="signPage">
                                Sign In
                               </button>
                               <div class="anotherOptn">
                                OR
                               </div>
                               <button type="button" class="signinCode" >
                                Use a sign-in code
                               </button>
                               <a href="#" class="forgotPassword"> Forgot password</a>
                               <div class="rememberOptn">
                                <label class="rememberLable">
                                    <input type="checkbox" class="rememberBox">
                                    <span class="rememberCust"></span>
                                    <span class="checkNew">Remember me</span>
                                </label>
                               </div>
                          </div>
                         <p class="signUp">New to netflix?<a href="#"> Sign up now.</a></p>
                         <p class="captcha">This page is protected by Google to ensure you're not a bot.</p>
                         <a href="#" class="learnMore">Learn More</a>
                        </form>
                    </div>
                </div>
            </div>
      </div> 
      <div class="footer">
        <p class="call">
            Questions? call 000-000-919-1743(Toll-Free)
        </p>
        <div class="footerLinks">
            <div class="box"> <a href="#">FAQ</a></div>
            <div class="box"> <a href="#">Help Centre</a></div>
            <div class="box"> <a href="#">Terms of Use</a></div>
            <div class="box"> <a href="#">Privacy</a></div>

            <div class="box"> <a href="#">Cookie Preferences</a></div>
            <div class="box"> <a href="#">Corporate Information</a></div>
        </div>
        <div class="langSelect">
            <i class="fa-solid fa-language selectIcon"></i>
            <select>
                <option>English</option>
                <option>Hindi</option>
            </select>
        </div>
      </div>
</body>
</html>
